name: Account stats (read-only)

# Manual only. Pulls followers + per-post engagement + reel insights and prints
# them to the run log. Posts nothing, changes nothing.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Pull account stats
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_VERSION: ${{ vars.GRAPH_VERSION }}
        run: python automation/account_stats.py
