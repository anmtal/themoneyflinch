name: Content buffer alert

# Twice a week (Mon + Thu), checks how much unposted content is left. If under ~9
# days, opens a GitHub issue (which emails you) so you have comfortable lead time
# to refill. Skips if an alert issue is already open, so it never spams. No PC needed.
on:
  schedule:
    - cron: "0 13 * * 1"     # Mondays 13:00 UTC
    - cron: "0 13 * * 4"     # Thursdays 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: buf
        run: python automation/check_buffer.py
      - name: Open an issue if the buffer is low (and none open yet)
        if: ${{ fromJSON(steps.buf.outputs.days_left) < 9 }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_count=$(gh issue list --repo "${{ github.repository }}" --state open \
            --search "Money Flinch content is low in:title" --json number -q 'length')
          if [ "$open_count" -gt 0 ]; then
            echo "An alert issue is already open — skipping to avoid spam."
            exit 0
          fi
          gh issue create --repo "${{ github.repository }}" \
            --title "Money Flinch content is low (~${{ steps.buf.outputs.days_left }} days left)" \
            --body "The posting queue has ${{ steps.buf.outputs.unposted }} posts left (~${{ steps.buf.outputs.days_left }} days of content). Open Claude and say \"refill\" to generate the next verified batch. Close this issue once you've refilled."
