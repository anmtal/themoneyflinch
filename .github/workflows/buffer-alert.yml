name: Content buffer alert

# Every Monday, checks how much unposted content is left. If under ~1 week,
# opens a GitHub issue (which emails you) so you know to refill. Free, no PC needed.
on:
  schedule:
    - cron: "0 13 * * 1"     # Mondays 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: buf
        run: python automation/check_buffer.py
      - name: Open an issue if the buffer is low
        if: ${{ fromJSON(steps.buf.outputs.days_left) < 7 }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --repo "${{ github.repository }}" \
            --title "Money Flinch content is low (~${{ steps.buf.outputs.days_left }} days left)" \
            --body "The posting queue has ${{ steps.buf.outputs.unposted }} posts left (~${{ steps.buf.outputs.days_left }} days of content). Open Claude and say \"refill\" to generate the next verified batch."
