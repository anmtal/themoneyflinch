name: Refresh Instagram token

# Renews the Instagram token every month (well inside its ~60-day life) so it
# never expires, and makes a tiny heartbeat commit so GitHub never auto-disables
# the scheduled workflows for inactivity.
on:
  schedule:
    - cron: "0 6 1 * *"     # 06:00 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Refresh token + update secret
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python automation/refresh_token.py

      - name: Heartbeat commit (keeps schedules alive)
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .last-refresh
          git config user.name "flinch-bot"
          git config user.email "flinch-bot@users.noreply.github.com"
          git add .last-refresh
          git commit -m "chore: monthly token refresh heartbeat" || echo "nothing to commit"
          git push
