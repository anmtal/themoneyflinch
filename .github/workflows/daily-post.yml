name: Money Flinch scheduler

# Posts whatever is due (2/day at 12:00 and 20:00 Eastern per the manifest).
# The precise trigger is cron-job.org calling workflow_dispatch on the minute;
# this cron is only a self-healing backup, since GitHub's scheduler runs late.
#
# The backup cron is deliberately OFF the hour. America/Toronto is a whole-hour
# offset, so 12:00/20:00 local land exactly on :00 UTC — a "*/30" cron would fire
# the same minute as the external trigger, every single time, at both post times.
on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "due (default) | check | <slug to post now>"
        required: false
        default: "due"

permissions:
  contents: write

# Only ever ONE publish run at a time. cancel-in-progress must stay false: killing
# a run mid-publish can leave a reel live but unrecorded, which re-posts later.
concurrency:
  group: money-flinch-publish
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # ref: pins to the BRANCH HEAD, not the trigger SHA. A run queued behind the
      # concurrency guard was triggered before the run ahead of it recorded its post,
      # so a default checkout would hand it a stale posted.json and it would publish
      # the same reel again.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Re-read the posted log at the last possible moment
        run: |
          git fetch origin ${{ github.event.repository.default_branch }} --quiet
          git checkout FETCH_HEAD -- content/posted.json content/failed.json 2>/dev/null || true
          echo "posted:"; cat content/posted.json
      - name: Publish due / run mode
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMAGE_BASE_URL: ${{ secrets.IMAGE_BASE_URL }}
          GRAPH_VERSION: ${{ vars.GRAPH_VERSION }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ] || [ "$MODE" = "due" ]; then
            python automation/publisher.py --due
          elif [ "$MODE" = "check" ]; then
            python automation/publisher.py --check
          else
            python automation/publisher.py --slug "$MODE"
          fi
      # always(): a run that failed AFTER publishing still must record the post, or
      # it re-posts on the next cron. This step is the thing that keeps that true.
      - name: Record what was posted (permanent log)
        if: always()
        run: python automation/commit_logs.py ${{ github.event.repository.default_branch }}
