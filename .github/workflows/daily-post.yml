name: Money Flinch scheduler

# Runs every 30 min and posts whatever is due (2 posts/day per the manifest's
# publish_at times). Posting whatever-is-due self-heals missed runs, and the
# idempotency guard prevents double-posting. Public repo => free Actions minutes.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "due (default) | check | <slug to post now>"
        required: false
        default: "due"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Publish due / run mode
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMAGE_BASE_URL: ${{ secrets.IMAGE_BASE_URL }}
          GRAPH_VERSION: ${{ vars.GRAPH_VERSION }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ] || [ "$MODE" = "due" ]; then
            python automation/publisher.py --due
          elif [ "$MODE" = "check" ]; then
            python automation/publisher.py --check
          else
            python automation/publisher.py --slug "$MODE"
          fi
      - name: Record what was posted (permanent log)
        if: always()
        run: |
          git add content/posted.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git config user.name "flinch-bot"
            git config user.email "flinch-bot@users.noreply.github.com"
            git commit -m "chore: record posted content"
            # retry across races with other pushes — this log MUST land, or a
            # later run could re-post the same content
            git push || (git pull --rebase --autostash && git push) \
                     || (sleep 10 && git pull --rebase --autostash && git push)
          fi
